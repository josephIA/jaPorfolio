<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Joseph Amajama</title>
<link rel="stylesheet" href="css/style.css">
<script defer src="js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>

<header class="navbar">
  <h2 class="logo"><a href="index.html">JA</a></h2>

  <div class="menu-toggle">☰</div>

  <nav class="nav-links">
 
    <a href="about.html">About</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </nav>

  <button id="themeToggle">🌙</button>
</header>

<section class="section">
  <h1 class="section-title">Let’s Work Together</h1>

  <div class="contact-wrapper reveal">

    <!-- Contact Info -->
    <div class="contact-info">
      <p>I’m available for freelance projects, website redesigns, and frontend development work.</p>

      <!-- Social Media -->
      <div class="social-links">
        <a rel="noopener noreferrer" href="https://x.com/iamajama" target="_blank" class="social x"> <img src="assets/x.jpg" alt="X"> </a>
        <a rel="noopener noreferrer" href="https://github.com/josephIA" target="_blank" class="social github"> <img src="assets/github.jpg" alt="GitHub"> </a>
        <a rel="noopener noreferrer" href="https://www.linkedin.com/in/joseph-amajama-8542a414b?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="social linkedin"> <img src="assets/linkedin.jpg" alt="LinkedIn"> </a>
      </div>
    </div>

    <!-- Contact Form -->
    <form id="contactForm" class="contact-form">
      <input type="text" id="fullName" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <textarea id="message" placeholder="Tell me about your project..." required></textarea>

      <button type="submit" class="btn primary">
        <span id="btnText">Send Message</span>
        <span id="btnSpinner" class="spinner"></span>
      </button>
    </form>
  </div>
</section>

<!-- Toast Notification -->
<div id="toast" class="toast">
  <span id="toastIcon" class="toast-icon"></span>
  <span id="toastMessage"></span>
</div>

</body>
</html>
